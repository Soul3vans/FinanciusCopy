<!DOCTYPE html>
<html>
<head><title>Verificar 2FA</title></head>
<body>
  <form method="post">
    {% csrf_token %}
    <input type="text" name="token" placeholder="Código de Google Authenticator" required>
    {% if error %}<p>{{ error }}</p>{% endif %}
    <button type="submit">Verificar</button>
  </form>
</body>
</html>
