{% extends 'finanzas/base.html' %}
{% block titulo %}Cuenta{% endblock %}
{% block contenido %}
  <h2>{% if cuenta %}Editar{% else %}Nueva{% endif %} Cuenta</h2>
  <form method="post">
    {% csrf_token %}
    <label>Título</label>
    <input type="text" name="titulo" value="{{ cuenta.titulo }}" required>

    <label>Moneda</label>
    <select name="moneda">
      {% for m in monedas %}
        <option value="{{ m.pk }}" {% if cuenta.moneda_id == m.pk %}selected{% endif %}>{{ m.simbolo }}</option>
      {% endfor %}
    </select>

    <label>Balance</label>
    <input type="number" step="0.01" name="balance" value="{{ cuenta.balance|default:'0' }}">

    <label>Incluir en totales</label>
    <input type="checkbox" name="incluir_en_totales" {% if cuenta.incluir_en_totales %}checked{% endif %}>

    <label>Mostrar en selección</label>
    <input type="checkbox" name="mostrar_en_seleccion" {% if cuenta.mostrar_en_seleccion %}checked{% endif %}>

    <label>Nota</label>
    <textarea name="nota">{{ cuenta.nota }}</textarea>

    <button type="submit">Guardar</button>
    <a href="{% url 'lista_cuentas' %}">Cancelar</a>
  </form>
{% endblock %}
